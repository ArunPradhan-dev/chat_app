<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-left">
        <h2>Reset Password</h2>
        <form method="POST" autocomplete="off">
            <div class="password-field">
                <input type="password" id="new-password" name="password" placeholder="New Password" required>
                <button type="button" class="toggle-eye" onclick="toggleVisibility('new-password', this)">👁️</button>
            </div>
            <div class="password-field">
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="button" class="toggle-eye" onclick="toggleVisibility('confirm-password', this)">👁️</button>
            </div>
            <button type="submit">Reset Password</button>
        </form>
        <div class="auth-footer">
            Want to go back? <a href="/login">Login</a>
        </div>
    </div>
    <div class="auth-right">
        <h2>Create New Password</h2>
        <p>Choose a secure and strong password</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    function toggleVisibility(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.textContent = "🙈";
        } else {
            input.type = "password";
            el.textContent = "👁️";
        }
    }

    window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const toast = document.getElementById('toast');

        if (error === 'mismatch') {
            toast.textContent = "Passwords do not match";
        } else if (error === 'weak') {
            toast.textContent = "Password must be 6+ characters, include upper, lower, and special character";
        }

        if (error) {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
    };
</script>
</body>
</html>
