<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-left">
        <h2>Create Your Account</h2>
        <form method="POST" autocomplete="off">
            <input type="text" name="username" id="username" placeholder="Username" required value="{{ request.args.get('username', '') }}">
            <input type="email" name="email" id="email" placeholder="Email" required value="{{ request.args.get('email', '') }}">

<div class="password-field">
  <input type="password" name="password" id="signup-password" placeholder="Password" required>
  <button type="button" class="toggle-eye" onclick="toggleVisibility('signup-password', this)">👁️</button>
</div>

<div class="password-field">
  <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm Password" required>
  <button type="button" class="toggle-eye" onclick="toggleVisibility('confirm-password', this)">👁️</button>
</div>


            <button type="submit">Sign Up</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
    <div class="auth-right">
        <h2>Welcome!</h2>
        <p>Join and start chatting with the world</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    function toggleVisibility(id, el) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    el.textContent = "🙈";
  } else {
    input.type = "password";
    el.textContent = "👁️";
  }
}

    window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const toast = document.getElementById('toast');

    if (error) {
        if (error === 'exists') {
            toast.textContent = "Username already exists";
        } else if (error === 'mismatch') {
            toast.textContent = "Passwords do not match";
        } else if (error === 'invalid_username') {
            toast.textContent = "Username must contain only alphabets";
        } else if (error === 'weak_password') {
            toast.textContent = "Password must be at least 6 characters, include upper, lower, and special character";
        }

        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('signup-password');

    if (usernameInput && passwordInput) {
        usernameInput.addEventListener('focus', () => {
            showHint("Username should contain only letters (A–Z, a–z)");
        });
        passwordInput.addEventListener('focus', () => {
            showHint("Password must include uppercase, lowercase, special char, and 6+ characters");
        });
        usernameInput.addEventListener('blur', hideHint);
        passwordInput.addEventListener('blur', hideHint);
    }

    function showHint(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
    }

    function hideHint() {
        toast.classList.remove('show');
    }
};


</script>
</body>
</html>
